name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: transafrik
          POSTGRES_PASSWORD: transafrik_secret
          POSTGRES_DB: transafrik
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transafrik"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Migrate and seed
        working-directory: backend
        env:
          DATABASE_URL: postgresql://transafrik:transafrik_secret@localhost:5432/transafrik
        run: |
          alembic upgrade head
          python -m app.seed
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://transafrik:transafrik_secret@localhost:5432/transafrik
        run: pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
